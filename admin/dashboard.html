<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Spice &amp; Ember Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-logo"><span class="flame-ico">🔥</span>Spice <span>&amp; Ember</span></div>
    <nav class="admin-nav">
      <a href="dashboard.html" class="active">📊 Dashboard</a>
      <a href="orders.html">📦 Orders</a>
      <a href="payments.html">💳 Payments</a>
      <a href="bookings.html">📅 Bookings</a>
      <a href="menu-manage.html">🍽️ Menu</a>
      <a href="../index.html">🌐 View Site</a>
    </nav>
    <div class="admin-sidebar-foot"><button class="admin-logout">🚪 Log Out</button></div>
  </aside>
  <div class="admin-overlay"></div>
  <main class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="icon-btn admin-menu-toggle" aria-label="Menu">☰</button>
        <h1>Dashboard</h1>
      </div>
      <div class="admin-topbar-actions">
        <button class="icon-btn theme-toggle" aria-label="Theme"><span class="sun-icon">☀️</span><span class="moon-icon" style="display:none">🌙</span></button>
      </div>
    </header>
    <div class="admin-content">
      <div class="admin-cards" id="dashboardCards">
        <div class="admin-card"><div class="admin-card-ico">💰</div><div class="admin-card-val" id="totalRevenue">₹0.00</div><div class="admin-card-lbl">Total Revenue</div></div>
        <div class="admin-card"><div class="admin-card-ico">📦</div><div class="admin-card-val" id="totalOrders">0</div><div class="admin-card-lbl">Total Orders</div></div>
        <div class="admin-card"><div class="admin-card-ico">📅</div><div class="admin-card-val" id="activeBookings">0</div><div class="admin-card-lbl">Active Bookings</div></div>
        <div class="admin-card"><div class="admin-card-ico">👥</div><div class="admin-card-val" id="totalGuests">0</div><div class="admin-card-lbl">Total Guests</div></div>
      </div>
      <div class="admin-panel">
        <div class="admin-panel-head"><h2>Recent Orders</h2><a href="orders.html" class="btn btn-ghost">View All</a></div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr><th>Order</th><th>Items</th><th>Total</th><th>Status</th><th>Placed</th></tr></thead>
            <tbody id="recentOrdersTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/menu-data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
