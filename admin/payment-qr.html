<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment QR — Spice &amp; Ember Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .pos-wrap{display:flex;flex-wrap:wrap;gap:26px;justify-content:center;align-items:flex-start}
    .pos-card{width:360px;max-width:100%;border-radius:22px;padding:26px;background:linear-gradient(160deg,#221d19,#15110e);border:1px solid rgba(140,129,117,.22);box-shadow:0 24px 60px rgba(0,0,0,.4)}
    .pos-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .pos-brand{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.01em}
    .pos-brand .flame{filter:drop-shadow(0 0 6px rgba(255,120,40,.6))}
    .pos-tag{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:#9a8f82;border:1px solid rgba(140,129,117,.3);padding:4px 9px;border-radius:999px}
    .pos-screen{background:#0c0a08;border-radius:14px;padding:16px 20px;text-align:right;box-shadow:inset 0 2px 10px rgba(0,0,0,.5)}
    .pos-screen-lbl{font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;color:#857a6d}
    .pos-screen-val{font-size:2.5rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.15;color:#fff}
    .pos-note{width:100%;margin:14px 0;padding:11px 14px;border-radius:10px;border:1px solid rgba(140,129,117,.3);background:rgba(255,255,255,.03);color:inherit;font-size:.95rem}
    .pos-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .pos-key{padding:18px 0;border-radius:13px;border:1px solid rgba(140,129,117,.18);background:rgba(255,255,255,.045);color:#fff;font-size:1.3rem;font-weight:600;cursor:pointer;transition:background .15s,transform .08s;-webkit-tap-highlight-color:transparent}
    .pos-key:hover{background:rgba(255,255,255,.11)}
    .pos-key:active{transform:scale(.95)}
    .pos-key.fn{color:#fbbf24;font-size:1.05rem}
    .pos-charge{width:100%;padding:17px;font-size:1.06rem;font-weight:700;border-radius:14px}
    .pos-hint{color:#857a6d;font-size:.82rem;margin:12px 2px 0;text-align:center}
    .pos-receipt{text-align:center}
    .pos-qr-frame{background:#fff;border-radius:18px;padding:16px;width:248px;height:248px;margin:6px auto 14px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .pos-qr-frame img{max-width:100%;max-height:100%}
    .pos-scan-hint{color:#9a8f82;font-size:.86rem;margin-bottom:6px}
    .qr-amount-lbl{font-size:2rem;font-weight:800;color:#fff}
    .qr-status-lbl{margin-top:10px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;font-size:1rem}
    .qr-status-lbl.waiting{color:#fbbf24}
    .qr-status-lbl.paid{color:#34d399}
    .qr-dot{width:11px;height:11px;border-radius:50%;background:#fbbf24;display:inline-block;box-shadow:0 0 0 0 rgba(251,191,36,.6);animation:qrpulse 1.2s infinite}
    @keyframes qrpulse{0%{box-shadow:0 0 0 0 rgba(251,191,36,.5)}70%{box-shadow:0 0 0 10px rgba(251,191,36,0)}100%{box-shadow:0 0 0 0 rgba(251,191,36,0)}}
    .pos-newsale{margin-top:20px}
  </style>
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-logo"><span class="flame-ico">🔥</span>Spice <span>&amp; Ember</span></div>
    <nav class="admin-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="orders.html">📦 Orders</a>
      <a href="payments.html">💳 Payments</a>
      <a href="payment-qr.html" class="active">💸 Payment QR</a>
      <a href="bookings.html">📅 Bookings</a>
      <a href="menu-manage.html">🍽️ Menu</a>
      <a href="../index.html">🌐 View Site</a>
    </nav>
    <div class="admin-sidebar-foot"><button class="admin-logout">🚪 Log Out</button></div>
  </aside>
  <div class="admin-overlay"></div>
  <main class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:14px"><button class="icon-btn admin-menu-toggle">☰</button><h1>Payment QR</h1></div>
      <div class="admin-topbar-actions"><button class="icon-btn theme-toggle"><span class="sun-icon">☀️</span><span class="moon-icon" style="display:none">🌙</span></button></div>
    </header>
    <div class="admin-content">
      <div class="pos-wrap" id="qrGen">
        <div class="pos-card pos-terminal" id="qrTerminal">
          <div class="pos-head">
            <span class="pos-brand"><span class="flame">🔥</span> Spice &amp; Ember</span>
            <span class="pos-tag">Point of Sale</span>
          </div>
          <div class="pos-screen">
            <div class="pos-screen-lbl">Amount to charge</div>
            <div class="pos-screen-val" id="qrAmount">₹0.00</div>
          </div>
          <input type="text" id="qrNote" class="pos-note" placeholder="Note (optional) — e.g. Table 5">
          <div class="pos-keypad" id="qrKeypad">
            <button class="pos-key" data-key="1">1</button>
            <button class="pos-key" data-key="2">2</button>
            <button class="pos-key" data-key="3">3</button>
            <button class="pos-key" data-key="4">4</button>
            <button class="pos-key" data-key="5">5</button>
            <button class="pos-key" data-key="6">6</button>
            <button class="pos-key" data-key="7">7</button>
            <button class="pos-key" data-key="8">8</button>
            <button class="pos-key" data-key="9">9</button>
            <button class="pos-key fn" data-key="clear">C</button>
            <button class="pos-key" data-key="0">0</button>
            <button class="pos-key fn" data-key="back">⌫</button>
          </div>
          <button class="btn btn-primary pos-charge" id="qrGenerateBtn">Generate QR</button>
          <p class="pos-hint">Punch in the amount, then generate a UPI QR for the customer to scan.</p>
        </div>
        <div class="pos-card pos-receipt" id="qrResult" style="display:none">
          <div class="pos-head">
            <span class="pos-brand"><span class="flame">🔥</span> Spice &amp; Ember</span>
            <span class="pos-tag">Scan to pay</span>
          </div>
          <div class="pos-scan-hint">Scan with any UPI app</div>
          <div class="pos-qr-frame"><img id="qrImage" alt="Scan to pay"></div>
          <div class="qr-amount-lbl" id="qrAmountLabel"></div>
          <div class="qr-status-lbl waiting" id="qrStatus"><span class="qr-dot"></span> Waiting for payment…</div>
          <button class="btn btn-ghost pos-newsale" id="qrResetBtn">New Sale</button>
        </div>
      </div>
    </div>
  </main>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/menu-data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
