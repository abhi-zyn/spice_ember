<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Spice &amp; Ember</title>
  <meta name="description" content="Explore the full Spice & Ember menu — fire-roasted starters, smoked mains, charcoal grills, sides, desserts and craft drinks.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body data-page="menu">
  <div id="nav-mount"></div>

  <section class="page-hero">
    <div class="page-hero-bg"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1600&q=80" alt="Menu"></div>
    <div class="container">
      <h1>Our Menu</h1>
      <p>From fire-roasted starters to ember-baked desserts — every plate tells a story of flame.</p>
      <div class="breadcrumb"><a href="index.html">Home</a> / <span>Menu</span></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="menu-controls">
        <div class="category-pills"></div>
        <div class="menu-tools">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search dishes…" aria-label="Search menu">
          </div>
          <select class="sort-select" aria-label="Sort by">
            <option value="popular">Most Popular</option>
            <option value="rating">Top Rated</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="name">Name (A–Z)</option>
          </select>
        </div>
      </div>
      <div class="menu-grid menu-grid-dynamic"></div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/menu-data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
